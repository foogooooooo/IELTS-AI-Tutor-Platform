<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智谱AI API测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 { color: #333; margin-bottom: 10px; }
        .subtitle { color: #666; margin-bottom: 30px; }
        .status {
            padding: 15px 20px;
            border-radius: 8px;
            margin: 15px 0;
            font-weight: 500;
        }
        .status.success { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        .status.loading { background: #fff3cd; color: #856404; }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
        }
        button:hover { background: #45a049; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .response {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 6px;
            border-left: 4px solid #4CAF50;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 14px;
            max-height: 300px;
            overflow-y: auto;
        }
        .info {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }
        .info code {
            background: rgba(0,0,0,0.05);
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 智谱AI API测试</h1>
        <p class="subtitle">测试智谱AI（GLM-4）API连接是否正常</p>
        
        <div class="info">
            <strong>API配置：</strong><br>
            模型：<code>glm-4</code>（文本）/ <code>glm-4v</code>（图片）<br>
            端点：<code>https://open.bigmodel.cn/api/paas/v4/chat/completions</code>
        </div>
        
        <div id="status" class="status loading">
            ⏳ 点击按钮开始测试...
        </div>
        
        <button id="testBtn" onclick="testAPI()">🚀 测试API连接</button>
        <button id="testImageBtn" onclick="testImageAPI()">🖼️ 测试图片识别（GLM-4V）</button>
        
        <div id="response" class="response" style="display: none;"></div>
    </div>

    <script>
        const CONFIG = {
            zhipuApiKey: '',  // 请填入你的智谱AI API Key
            zhipuApiUrl: 'https://open.bigmodel.cn/api/paas/v4/chat/completions',
            zhipuModel: 'glm-4',
            zhipuVisionModel: 'glm-4v'
        };

        function updateStatus(message, type) {
            const statusEl = document.getElementById('status');
            statusEl.className = `status ${type}`;
            statusEl.textContent = message;
        }

        function showResponse(text) {
            const responseEl = document.getElementById('response');
            responseEl.style.display = 'block';
            responseEl.textContent = text;
        }

        async function testAPI() {
            const btn = document.getElementById('testBtn');
            btn.disabled = true;
            updateStatus('⏳ 正在测试文本API...', 'loading');
            
            try {
                const response = await fetch(CONFIG.zhipuApiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${CONFIG.zhipuApiKey}`
                    },
                    body: JSON.stringify({
                        model: CONFIG.zhipuModel,
                        messages: [
                            { role: 'user', content: '你好，请简单介绍一下自己' }
                        ],
                        temperature: 0.7,
                        max_tokens: 150
                    })
                });
                
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(`HTTP ${response.status}: ${errorData.error?.message || 'Unknown error'}`);
                }
                
                const data = await response.json();
                const aiResponse = data.choices[0].message.content;
                
                updateStatus('✅ API连接成功！智谱AI正常工作', 'success');
                showResponse(`模型: ${data.model}\n回复:\n${aiResponse}\n\n完整响应:\n${JSON.stringify(data, null, 2)}`);
            } catch (error) {
                updateStatus(`❌ API连接失败: ${error.message}`, 'error');
                showResponse(`错误详情:\n${error.stack}`);
            } finally {
                btn.disabled = false;
            }
        }

        async function testImageAPI() {
            const btn = document.getElementById('testImageBtn');
            btn.disabled = true;
            updateStatus('⏳ 正在测试图片识别API...', 'loading');
            
            // 使用一个简单的测试图片（1x1像素的透明PNG，base64编码）
            const testImageData = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg==';
            
            try {
                const response = await fetch(CONFIG.zhipuApiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${CONFIG.zhipuApiKey}`
                    },
                    body: JSON.stringify({
                        model: CONFIG.zhipuVisionModel,
                        messages: [
                            {
                                role: 'user',
                                content: [
                                    {
                                        type: 'image_url',
                                        image_url: { url: testImageData }
                                    },
                                    {
                                        type: 'text',
                                        text: '这是一张测试图片，请描述你看到了什么（即使是很小的图片）'
                                    }
                                ]
                            }
                        ],
                        temperature: 0.7,
                        max_tokens: 150
                    })
                });
                
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(`HTTP ${response.status}: ${errorData.error?.message || 'Unknown error'}`);
                }
                
                const data = await response.json();
                const aiResponse = data.choices[0].message.content;
                
                updateStatus('✅ 图片API连接成功！GLM-4V正常工作', 'success');
                showResponse(`模型: ${data.model}\n回复:\n${aiResponse}\n\n完整响应:\n${JSON.stringify(data, null, 2)}`);
            } catch (error) {
                updateStatus(`❌ 图片API连接失败: ${error.message}`, 'error');
                showResponse(`错误详情:\n${error.stack}`);
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
